spring:
  application:
    name: homehub
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8081

logging:
  level:
    root: INFO
    com.aab.homehub: DEBUG
    org.springdoc: DEBUG
    org.springframework.web: DEBUG

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000
