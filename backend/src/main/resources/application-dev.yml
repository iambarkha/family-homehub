spring:
  application:
    name: homehub
  datasource:
    url: jdbc:h2:mem:homehub
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
  mail:
    host: localhost
    port: 1025   # fake SMTP port — just logs, never sends
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: household-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.aab.homehub.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8082

logging:
  level:
    root: INFO
    com.aab.homehub: DEBUG
    org.springdoc: DEBUG
    org.springframework.web: DEBUG
    org.springframework.mail: DEBUG

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

app:
  nutrition:
    min-daily-calories: 1800
    min-daily-protein-grams: 50
