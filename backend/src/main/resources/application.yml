spring:
  application:
    name: homehub
  datasource:
    url: jdbc:h2:mem:homehub
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
  mail:
    host: localhost
    port: 1025   # fake SMTP port — just logs, never sends


server:
  port: 8082

logging:
  level:
    root: INFO
    com.aab.homehub: DEBUG
    org.springdoc: DEBUG
    org.springframework.web: DEBUG
    org.springframework.mail: DEBUG

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000
app:
  nutrition:
    min-daily-calories: 1800
    min-daily-protein-grams: 50
